  trigger:
    branches:
      include:
        - saas
    paths:
      include:
        - api/web-api/*
        - cmd/web/*
        - pkg/*
        - go.mod
        - go.sum

  pool:
    vmImage: ubuntu-latest

  variables:
    GO_VERSION: '1.25'
    BINARY_NAME: web-api.0.0.1

  steps:
    - task: GoTool@0
      displayName: Setup Go
      inputs:
        version: $(GO_VERSION)

    - script: |
        mkdir -p ~/.ssh
        echo "$(DEPLOY_KEY)" | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
        eval "$(ssh-agent -s)"
      displayName: Setup SSH key

    - script: |
        go mod download
        GOOS=linux GOARCH=amd64 go build -o $(BINARY_NAME) cmd/web/web.go
      displayName: Build binary

    - task: PublishBuildArtifacts@1
      displayName: Publish artifact
      inputs:
        pathToPublish: $(BINARY_NAME)
        artifactName: web-api-drop